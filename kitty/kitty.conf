# ============================================================
# Kitty Terminal Configuration
# Optimized for Python, Neovim and Data Science workflow
# ============================================================

# hide_window_decorations yes
hide_window_decorations yes

# ============================================================
# Fonts
# ============================================================

# Main programming font
#JetBrainsMono Nerd Font
font_family JetBrainsMono Nerd Font

# Automatically use matching bold/italic variants
bold_font auto
italic_font auto
bold_italic_font auto

# Comfortable reading size
font_size 12.0

# Increase line spacing for readability
adjust_line_height 110%

# Keep default character width
adjust_column_width 0

# Enable programming ligatures
disable_ligatures never


# ============================================================
# Theme
# ============================================================

# Uncomment only ONE theme

# include themes/Dracula.conf
include themes/tokyo-night.conf
# include themes/Monokai.conf
# include themes/Nord.conf


# ============================================================
# Window Appearance
# ============================================================

# Small padding around terminal contents
window_padding_width 4

# Keep native title bar
hide_window_decorations titlebar-only

# Slight transparency (optional)
# background_opacity 0.96

# Blur only works on supported compositors
# background_blur 5

# Resize windows in single-cell increments
resize_in_steps yes


# ============================================================
# Tabs
# ============================================================

tab_bar_style fade
tab_bar_edge top
tab_bar_min_tabs 2
tab_separator "  "
#tab_powerline_style slanted

# Show current program name
tab_title_template "{title}"

# Hide tab bar when only one tab exists
tab_bar_min_tabs 2


# ============================================================
# Cursor
# ============================================================

# Thin cursor for coding
cursor_shape beam

# Keep cursor always visible
cursor_blink_interval 0

# Small trail effect
cursor_trail 3

# Smooth cursor movement
cursor_stop_blinking_after 15

# Use system cursor theme (Aosp-cursors)
env XCURSOR_THEME=Aosp-cursors
env XCURSOR_SIZE=24

# Optional: Text cursor style inside terminal
# cursor_beam_thickness 1.6
# ============================================================
# Scrolling
# ============================================================

# Large scrollback buffer
scrollback_lines 100000

# Smooth mouse wheel scrolling
wheel_scroll_min_lines 1
touch_scroll_multiplier 2.0


# ============================================================
# Performance
# ============================================================

# Faster rendering
repaint_delay 8

# Minimize keyboard latency
input_delay 0

# Sync rendering with monitor refresh
sync_to_monitor yes


# ============================================================
# Clipboard
# ============================================================

copy_on_select yes

# Familiar shortcuts
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard


# ============================================================
# URL Handling
# ============================================================

# Curly underline for links
url_style curly

# Underline links on hover
underline_hyperlinks always


# ============================================================
# Bell
# ============================================================

# Disable annoying terminal bell
enable_audio_bell no

# Disable visual bell flash
visual_bell_duration 0.0


# ============================================================
# Window Behaviour
# ============================================================

confirm_os_window_close 0

enabled_layouts splits,stack,tall,fat

remember_window_size no

initial_window_width 900
initial_window_height 650


# ============================================================
# Shell Integration
# ============================================================

# Keep shell integration enabled
shell_integration enabled


# ============================================================
# Remote Control
# ============================================================

# Improve security
allow_remote_control no


# ============================================================
# Tab Management
# ============================================================

map ctrl+shift+t new_tab_with_cwd

map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab


# ============================================================
# Window Management
# ============================================================

# Open terminal in current directory
map ctrl+shift+enter launch --cwd=current

# Close current window
map ctrl+shift+w close_window

# Horizontal split
map ctrl+shift+d launch --location=hsplit --cwd=current

# Vertical split
map ctrl+shift+s launch --location=vsplit --cwd=current

# Navigate between splits
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right


# ============================================================
# Font Zoom
# ============================================================

map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0


# ============================================================
# Startup
# ============================================================

# Start in maximized mode if desired
# startup_session none

# Focus follows mouse (optional)
# focus_follows_mouse yes
